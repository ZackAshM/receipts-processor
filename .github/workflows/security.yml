name: Security

on:
  push:
  pull_request:
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: read

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Generate SBOM (CycloneDX JSON)
        run: |
          pip-audit -r requirements.lock.txt -f cyclonedx-json -o sbom.cdx.json --progress-spinner off || true
          if [ ! -s sbom.cdx.json ]; then
            echo '{}' > sbom.cdx.json
          fi

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-sbom
          path: sbom.cdx.json

      - name: Audit dependencies
        run: pip-audit -r requirements.lock.txt --progress-spinner off
