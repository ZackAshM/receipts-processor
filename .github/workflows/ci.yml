name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock.txt
          pip install -e . --no-build-isolation

      - name: Run tests
        env:
          PYTHONPATH: src
        run: pytest -q

      - name: Enforce CODEX_LOG redaction policy
        run: |
          if grep -nE "/Users/|/private/var/|[A-Za-z]:\\\\|file://" docs/CODEX_LOG.md; then
            echo "Found unredacted absolute file paths in docs/CODEX_LOG.md"
            exit 1
          fi
